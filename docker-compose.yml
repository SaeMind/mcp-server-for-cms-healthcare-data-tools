version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — CMS data warehouse
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cms_mcp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cms_data
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_password_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # CMS MCP Server
  # ─────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms_mcp_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DEMO_MODE: "false"
      DATABASE_URL: postgresql://cms_user:cms_password_local@postgres:5432/cms_data
      MCP_API_KEY: ${MCP_API_KEY:-dev_key_change_in_production}
      LOG_LEVEL: info
      CACHE_TTL_REFERENCE: 86400
      CACHE_TTL_TRANSACTION: 300
      RATE_LIMIT_REQUESTS_PER_MIN: 100
    ports:
      - "3000:3000"
    volumes:
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
